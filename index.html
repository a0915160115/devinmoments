<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">

<!-- 手機版畫面自適應 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>收涎儀式｜攝影作品</title>

<style>

/* =========================
   全站基礎設定
========================= */

/* 清除預設邊距 */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* 網頁整體字體與背景 */
body{
  font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
  background:#fffaf6;      /* 溫暖奶油色背景 */
  color:#4a4038;
  line-height:1.8;
}

/* 所有圖片自動滿版 */
img{
  width:100%;
  display:block;
  border-radius:18px;
}

/* 所有連結取消底線 */
a{
  text-decoration:none;
}

/* 內容最大寬度 */
.container{
  width:92%;
  max-width:1180px;
  margin:auto;
}

/* =========================
   首頁區塊 Hero
========================= */

.hero{
  padding:60px 0;
}

/* 左右排版 */
.hero-wrap{
  display:grid;
  grid-template-columns:1.1fr 1fr;
  gap:40px;
  align-items:center;
}

/* 小標籤 */
.tag{
  display:inline-block;
  background:#ffe7c7;
  color:#9a6b2f;
  padding:8px 16px;
  border-radius:99px;
  font-size:14px;
  margin-bottom:20px;
}

/* 主標題 */
.hero h1{
  font-size:56px;
  line-height:1.2;
  margin-bottom:18px;
}

/* 內文 */
.hero p{
  font-size:18px;
  color:#74675d;
  margin-bottom:30px;
}

/* 按鈕排列 */
.btn-group{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}

/* 按鈕共用樣式 */
.btn{
  padding:14px 24px;
  border-radius:999px;
  font-weight:700;
  transition:.25s;
}

/* 主按鈕 */
.btn-primary{
  background:#ffb86c;
  color:#fff;
}

/* 滑鼠移上去效果 */
.btn-primary:hover{
  background:#f6a648;
}

/* 第二顆按鈕 */
.btn-light{
  background:#fff;
  border:1px solid #f0d5b5;
  color:#8a6642;
}

/* 首頁右側照片框 */
.hero-image{
  background:#fff;
  padding:14px;
  border-radius:26px;
  box-shadow:0 15px 40px rgba(0,0,0,.08);
}

/* =========================
   共用區塊
========================= */

section{
  padding:70px 0;
}

/* 區塊標題 */
.section-title{
  text-align:center;
  margin-bottom:50px;
}

.section-title h2{
  font-size:38px;
  margin-bottom:10px;
}

.section-title p{
  color:#7c7169;
}

/* =========================
   照片區
========================= */

.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

/* =========================
   下載卡片區
========================= */

.download-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

/* 每張卡片 */
.card{
  background:#fff;
  padding:30px;
  border-radius:24px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
  text-align:center;
}

.card h4{
  font-size:22px;
  margin-bottom:10px;
}

.card p{
  color:#7d7066;
  margin-bottom:20px;
}

/* 卡片按鈕 */
.card a{
  display:inline-block;
  padding:12px 20px;
  background:#ffd59f;
  color:#6f4a1e;
  border-radius:999px;
  font-weight:700;
}

/* =========================
   頁尾
========================= */

footer{
  padding:50px 0;
  text-align:center;
  color:#8a7c72;
}

/* =========================
   手機版
========================= */

@media(max-width:900px){

.hero-wrap{
  grid-template-columns:1fr;
}

.hero h1{
  font-size:42px;
}

.gallery,
.download-grid{
  grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<!-- ======================
     首頁主視覺區
====================== -->
<header class="hero">

<div class="container hero-wrap">

  <!-- 左側文字 -->
  <div>

    <span class="tag">收涎紀錄・攝影作品</span>

    <h1>寶貝的重要時刻</h1>

    <p>
      謝謝你們邀請我一起參與這一天。<br>
      希望這些照片，很多年後再打開時，依然能想起今天的笑聲與幸福。
    </p>

    <div class="btn-group">

      <!-- 按鈕1：連到下載區 -->
      <a href="#download" class="btn btn-primary">
        下載照片
      </a>

      <!-- 按鈕2：跳到作品區 -->
      <a href="#gallery" class="btn btn-light">
        瀏覽精選
      </a>

    </div>

  </div>

  <!-- 右側封面照片 -->
  <div class="hero-image">

    <!-- 換成你的封面照片 -->
    <img src="./8.jpg" alt="抓周照片">

  </div>

</div>
</header>

<!-- ======================
     精選作品區
====================== -->
<section id="gallery">

<div class="container">

  <div class="section-title">
    <h2>今天的珍貴瞬間</h2>
    <p>每一個笑容，都值得被收藏</p>
  </div>

  <div class="gallery">

    <!-- 這裡換成你的照片 -->
    <img src="./9.jpg">
    <img src="./10.jpg">
    <img src="./11.jpg">
    <img src="./12.jpg">
    <img src="./13.jpg">
    <img src="./14.jpg">

  </div>

</div>
</section>

<!-- ======================
     雲端下載區
====================== -->
<section id="download">

<div class="container">

  <div class="section-title">
    <h2>作品下載專區</h2>
    <p>點擊按鈕前往雲端相簿</p>
  </div>

  <div class="download-grid">

    <!-- 卡片1 -->
    <div class="card">
      <h4>高清原圖版</h4>
      <p>空間保存30天 請提早下載完畢</p>

      <!-- 把 # 改成你的 Google Drive / Dropbox 連結 -->
      <a href="https://drive.google.com/drive/folders/1MrZoU5faKZi5WRv3DlOClysMj3DWj9N_?usp=sharing" target="_blank">
        前往下載
      </a>
    </div>

</div>
</section>

<!-- ======================
     頁尾
====================== -->
<footer>

<div class="container">

  用影像記錄你們最珍貴的日常 ✨<br>
  Your Name Photography

</div>

</footer>

</body>
</html>
